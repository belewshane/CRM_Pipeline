<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E4E2DC;--border2:#D0CEC6;
    --text:#1A1916;--text2:#6B6860;--text3:#9E9C96;
    --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--green-row:#F0FAF6;
    --yellow:#EF9F27;--yellow-bg:#FAEEDA;--yellow-text:#633806;--yellow-row:#FDF6E8;
    --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#791F1F;--red-row:#FDF0F0;
    --gray:#888780;--radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  /* Nav */
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;}
  .nav-brand{font-size:14px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .nav-brand span{font-weight:300;color:var(--text2);}
  .nav-actions{display:flex;gap:8px;align-items:center;}
  .btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--surface2);}
  .import-msg{font-size:11px;color:var(--green);font-weight:500;}

  /* View tabs */
  .view-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:flex-end;gap:0;flex-shrink:0;height:40px;}
  .view-tab{font-family:'DM Sans',sans-serif;font-size:12px;padding:0 16px;height:40px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap;}
  .view-tab:hover{color:var(--text);}
  .view-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}

  /* Layout */
  .layout{display:flex;flex:1;overflow:hidden;}
  .main-panel{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;}
  .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .panel-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  table{width:100%;border-collapse:collapse;table-layout:fixed;}
  thead th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;}
  thead th.num{text-align:right;}
  tbody tr{cursor:pointer;border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tr.row-g td{background:var(--green-row);}
  tr.row-y td{background:var(--yellow-row);}
  tr.row-r td{background:var(--red-row);}
  tr.row-g:hover td{background:#e5f7f1;}
  tr.row-y:hover td{background:#faf0d8;}
  tr.row-r:hover td{background:#fae5e5;}
  tr.active-row.row-g td{background:#ddf4ec;}
  tr.active-row.row-y td{background:#f7eccb;}
  tr.active-row.row-r td{background:#f7dede;}
  td{padding:5px 12px;font-size:11px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td.num{text-align:right;}
  .deal-name-g{color:var(--green-text)!important;font-weight:500;}
  .deal-name-y{color:var(--yellow-text)!important;font-weight:500;}
  .deal-name-r{color:var(--red-text)!important;font-weight:500;}
  .stage-badge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .stage-g{background:var(--green-bg);color:var(--green-text);border-color:#9FE1CB;}
  .stage-y{background:var(--yellow-bg);color:var(--yellow-text);border-color:#FAC775;}
  .stage-r{background:var(--red-bg);color:var(--red-text);border-color:#F7C1C1;}
  .tier-stripe{width:3px;height:16px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px;}
  .stripe-1{background:var(--green);}.stripe-2{background:var(--yellow);}.stripe-3{background:var(--red);}.stripe-4{background:var(--gray);}
  .tier-num{font-size:10px;font-weight:600;color:var(--text3);font-family:'DM Mono',monospace;}
  .flags{display:flex;gap:3px;}
  .flag{width:8px;height:8px;border-radius:50%;}
  .flag-g{background:var(--green);}.flag-y{background:var(--yellow);}.flag-r{background:var(--red);}.flag-e{background:var(--border2);}
  .arr-pill{display:inline-block;background:var(--green-bg);color:var(--green-text);font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;}
  .subtotal-row td{background:var(--surface2)!important;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--border2);border-bottom:2px solid var(--border2);padding:4px 12px;cursor:default;}
  .subtotal-row:hover td{background:var(--surface2)!important;}
  .subtotal-row.drop-target td{background:var(--yellow-bg)!important;outline:2px dashed var(--yellow);}
  .subtotal-row td.num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);}
  .total-row td{background:var(--surface2)!important;font-weight:500;font-size:10px;color:var(--text2);border-top:2px solid var(--border2);cursor:default;padding:4px 12px;}
  .total-row:hover td{background:var(--surface2)!important;}
  .total-row td.num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);}
  .next-move-cell{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* 12-box grid */
  .grid-wrap{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
  .grid-col-header{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:6px 0;display:flex;align-items:center;justify-content:center;gap:5px;}
  .grid-row-label{display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  .grid-row-label.rl-g{color:var(--green-text);}
  .grid-row-label.rl-y{color:var(--yellow-text);}
  .grid-row-label.rl-r{color:var(--red-text);}
  .grid-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);min-height:100px;padding:10px;display:flex;flex-direction:column;gap:6px;}
  .grid-box.box-g1{border-color:#9FE1CB;background:#F5FCF9;}
  .grid-box.box-g2{border-color:#C0DD97;background:#F7FAF2;}
  .grid-box.box-g3{border-color:var(--border);background:var(--surface);}
  .grid-box.box-g4{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-y1{border-color:#FAC775;background:#FDFAF3;}
  .grid-box.box-y2{border-color:var(--border);background:var(--surface);}
  .grid-box.box-y3{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-y4{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-r1{border-color:var(--border);background:var(--surface);}
  .grid-box.box-r2{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-r3{border-color:#F7C1C1;background:#FDF5F5;}
  .grid-box.box-r4{border-color:#F0A0A0;background:#FDF0F0;}
  .deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px;cursor:grab;transition:all .12s;}
  .deal-card:hover{border-color:var(--border2);background:var(--surface2);}
  .deal-card.active-card{border-color:var(--border2);background:var(--surface2);}
  .deal-card:active{cursor:grabbing;opacity:0.7;}
  .grid-box.drag-over{border-color:var(--border2) !important;outline:2px dashed var(--border2);}
  .dc-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dc-arr{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);}
  .dc-stage{font-size:10px;color:var(--text3);}
  .grid-empty{font-size:10px;color:var(--text3);text-align:center;padding:12px 0;}

  /* Schedule */
  .sched-nav{display:flex;align-items:center;gap:8px;}
  .sched-wk-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .12s;}
  .sched-wk-btn:hover{background:var(--surface2);}
  .sched-week-label{font-size:13px;font-weight:500;}
  .sched-table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .sched-table thead th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;}
  .sched-table thead th.day-col-h{text-align:center;}
  .sched-table tbody tr{border-bottom:1px solid var(--border);}
  .sched-table tbody tr:last-child{border-bottom:none;}
  .sched-table td{padding:5px 8px;font-size:12px;vertical-align:middle;overflow:hidden;white-space:nowrap;}
  .sched-table td.day-cell{text-align:center;padding:4px 6px;}
  tr.srow-g td{background:var(--green-row);}
  tr.srow-y td{background:var(--yellow-row);}
  tr.srow-r td{background:var(--red-row);}
  tr.srow-g td.sched-deal-name{color:var(--green-text);font-weight:500;}
  tr.srow-y td.sched-deal-name{color:var(--yellow-text);font-weight:500;}
  tr.srow-r td.sched-deal-name{color:var(--red-text);font-weight:500;}
  .act-select{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 6px;border-radius:var(--radius);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);width:100%;text-align:center;transition:all .12s;appearance:none;-webkit-appearance:none;}
  .act-select:hover{border-color:var(--border2);background:var(--surface);}
  .act-select:focus{outline:none;border-color:var(--border2);}
  .act-chip{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;width:100%;text-align:center;cursor:pointer;}
  .chip-meeting{background:var(--green-bg);color:var(--green-text);}
  .chip-called{background:var(--yellow-bg);color:var(--yellow-text);}
  .chip-emailed{background:#E6F1FB;color:#185FA5;}
  .cell-wrap{min-height:28px;display:flex;align-items:center;justify-content:center;}

  /* Side panel */
  .side{width:400px;min-width:400px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .side-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
  .side-deal-name{font-size:15px;font-weight:600;letter-spacing:-0.02em;margin-bottom:3px;}
  .side-meta{font-size:11px;color:var(--text2);}
  .side-close{position:absolute;right:1rem;top:1rem;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);line-height:1;}
  .side-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .side-tab{flex:1;padding:10px;font-size:12px;font-family:'DM Sans',sans-serif;border:none;background:transparent;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
  .side-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
  .side-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;}

  /* Conviction UI */
  .field-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
  .tier-selector{display:flex;gap:6px;margin-bottom:14px;}
  .tier-opt{flex:1;padding:7px 6px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;text-align:center;transition:all .12s;color:var(--text2);}
  .tier-opt:hover{background:var(--surface2);}
  .tier-opt.active-t1{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .tier-opt.active-t2{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .tier-opt.active-t3{background:var(--red-bg);border-color:#A32D2D;color:var(--red-text);}
  .tier-opt.active-t4{background:var(--surface2);border-color:var(--gray);color:var(--text2);}
  .status-selector{display:flex;gap:6px;margin-bottom:14px;}
  .status-opt{flex:1;padding:7px 6px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;text-align:center;transition:all .12s;color:var(--text2);}
  .status-opt:hover{background:var(--surface2);}
  .status-opt.active-g{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .status-opt.active-y{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .status-opt.active-r{background:var(--red-bg);border-color:#A32D2D;color:var(--red-text);}
  .dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .dim-card{background:var(--surface2);border-radius:var(--radius);padding:10px;border:1px solid var(--border);}
  .dim-label{font-size:11px;font-weight:600;margin-bottom:2px;}
  .dim-q{font-size:10px;color:var(--text2);margin-bottom:8px;line-height:1.4;font-style:italic;}
  .state-btns{display:flex;flex-direction:column;gap:3px;}
  .sb{font-size:11px;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);text-align:left;transition:all .12s;}
  .sb:hover{background:var(--surface);}
  .sb.au{background:#F1EFE8;border-color:#5F5E5A;color:#444441;}
  .sb.ae{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .sb.ac{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .cbar{display:flex;gap:2px;margin-top:8px;}
  .cs{height:3px;flex:1;border-radius:2px;background:var(--border);}
  .cs.fu{background:var(--gray);}.cs.fe{background:var(--yellow);}.cs.fc{background:var(--green);}
  .diag-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
  .diag-pat{font-size:12px;font-weight:600;margin-bottom:4px;}
  .diag-read{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:8px;}
  .diag-move-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px;}
  .diag-move{font-size:12px;line-height:1.55;}
  .field-row{margin-bottom:10px;}
  input[type=text],textarea,select{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--text2);}
  textarea{resize:vertical;min-height:64px;}
  .ask-btn{width:100%;margin-top:8px;padding:8px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;}
  .ask-btn:hover{background:var(--surface2);}
  .ask-resp{margin-top:8px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;line-height:1.6;color:var(--text2);}
  .save-btn{width:100%;margin-top:12px;padding:9px;border-radius:var(--radius);border:none;background:var(--text);color:white;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .12s;}
  .save-btn:hover{background:#2C2C2A;}


  /* Scenario planning */
  .scenario-summary{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:1rem;}
  .scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;}
  .scenario-card.has-value{border-color:#9FE1CB;background:var(--green-bg);}
  .scenario-card-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
  .scenario-card-value{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);letter-spacing:-0.02em;}
  .scenario-card.has-value .scenario-card-label{color:var(--green-text);}
  .scenario-card.has-value .scenario-card-value{color:var(--green-text);}
  .scenario-card.total-card{border-color:var(--border2);background:var(--surface2);}
  .scenario-card.total-card .scenario-card-value{font-size:20px;}
  .scenario-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--green);flex-shrink:0;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Pipeline <span>/ Northspyre</span></div>
  <div class="nav-actions">
    <span id="import-status" class="import-msg" style="display:none"></span>
    <label class="btn" style="cursor:pointer">Import CSV<input type="file" accept=".csv" id="csv-input" style="display:none"></label>
  </div>
</nav>

<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('tier',this)">By tier</button>
  <button class="view-tab" onclick="switchView('status',this)">By status</button>
  <button class="view-tab" onclick="switchView('arr',this)">By ARR</button>
  <button class="view-tab" onclick="switchView('conviction',this)">Conviction</button>
  <button class="view-tab" onclick="switchView('grid',this)">12-box grid</button>
  <button class="view-tab" onclick="switchView('scenario',this)">Scenario</button>
  <button class="view-tab" onclick="switchView('schedule',this)">Schedule</button>
</div>

<div class="layout">
  <div class="main-panel" id="main-panel"></div>

  <div class="side" id="sidepanel" style="display:none">
    <div class="side-header">
      <button class="side-close" onclick="closeSide()">×</button>
      <div class="side-deal-name" id="side-name"></div>
      <div class="side-meta" id="side-meta"></div>
    </div>
    <div class="side-tabs">
      <button class="side-tab active" id="stab-conviction" onclick="switchSideTab('conviction')">Conviction</button>
      <button class="side-tab" id="stab-details" onclick="switchSideTab('details')">Details</button>
    </div>
    <div class="side-body" id="side-body"></div>
  </div>
</div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_COLS=['mar','apr','may','jun'];

// ── SUPABASE CONFIG ──
const SB_URL='https://pqnnfnhcyurnbohsbgzz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbm5mbmhjeXVybmJvaHNiZ3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Nzk4MzcsImV4cCI6MjA4OTM1NTgzN30.RQfBgDX0uC1GOMnIRPFhezP60bCgHVFsZgpljdEMpPM';
const SB_HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{...SB_HEADERS,'Accept':'application/json'}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, params){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:SB_HEADERS});
  if(!r.ok)throw new Error(await r.text());
}

// Map DB row -> app deal object
function dbToDeal(r){
  return{id:r.id,name:r.name,stage:r.stage||'',amount:r.amount||0,arr:r.arr||0,closeDate:r.close_date||'',
    tier:r.tier||4,sentiment:r.sentiment||'y',pattern:r.pattern||'',nextMove:r.next_move||'',
    nstw:r.nstw||'',capability:r.capability||'unaware',impact:r.impact||'unaware',

function getCol(dateStr){
  if(!dateStr)return'q3';
  const m=MONTHS[new Date(dateStr).getMonth()].toLowerCase();
  return MONTH_COLS.includes(m)?m:'q3';
}

function fmtK(v){
  if(!v)return'';
  if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M';
  return'$'+Math.round(v/1000)+'k';
}

function getFlagDots(s){
  if(s==='g')return['flag-g','flag-g','flag-e'];
  if(s==='r')return['flag-r','flag-r','flag-e'];
  return['flag-y','flag-e','flag-e'];
}

/* ── TABLE RENDERING ── */
function tableHTML(sorted, groupKey){
  const groups=[];
  const seen=new Set();
  sorted.forEach(d=>{
    const k=groupKey(d);
    if(!seen.has(k)){seen.add(k);groups.push(k);}
  });

  const gt={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};
  let html='';

  groups.forEach(gk=>{
    const group=sorted.filter(d=>groupKey(d)===gk);
    const st={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};

    group.forEach(d=>{
      const col=getCol(d.closeDate);
      if(st[col]!==undefined)st[col]+=d.arr||0;
      st.arr+=d.arr||0;
      if(gt[col]!==undefined)gt[col]+=d.arr||0;
      gt.arr+=d.arr||0;

      const flags=getFlagDots(d.sentiment);
      const flagHtml=`<div class="flags">${flags.map(f=>`<div class="flag ${f}"></div>`).join('')}</div>`;
      const isActive=activeDeal&&activeDeal.id===d.id;
      const nm=d.nextMove||'';
      const cells=MONTH_COLS.concat(['q3']).map(c=>{
        if(c===col&&d.arr)return`<td class="num"><span class="arr-pill">${fmtK(d.arr)}</span></td>`;
        return`<td class="num"></td>`;
      }).join('');

      const isDraggable=currentView==='tier'||currentView==='status';
      const dragAttrs=isDraggable?`draggable="true" ondragstart="tableDragStart(event,${d.id})" ondragend="tableDragEnd(event)" style="cursor:grab;"`:'';

      html+=`<tr class="row-${d.sentiment}${isActive?' active-row':''}" ${dragAttrs} onclick="openDeal(${d.id})">
        <td>${flagHtml}</td>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}"></div><span class="tier-num">${d.tier}</span></div></td>
        <td class="deal-name-${d.sentiment}">${d.name}</td>
        <td><span class="stage-badge stage-${d.sentiment}">${d.stage||''}</span></td>
        ${cells}
        <td class="num" style="font-weight:500;font-family:'DM Mono',monospace;">${fmtK(d.arr)}</td>
        <td class="next-move-cell" title="${nm.replace(/"/g,'&quot;')}">${nm}</td>
      </tr>`;
    });

    const subCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${st[c]?fmtK(st[c]):''}</td>`).join('');
    const subLabel=groupKey===byTier?`Tier ${gk} — ${group.length} deal${group.length!==1?'s':''}`
      :groupKey===byStatus?({g:'On track',y:'Watch',r:'At risk'}[gk]||gk)+` — ${group.length} deal${group.length!==1?'s':''}`
      :`${group.length} deal${group.length!==1?'s':''}`;
    const isDroppable=currentView==='tier'||currentView==='status';
    const dropAttrs=isDroppable
      ?`ondragover="event.preventDefault();this.classList.add('drop-target')" ondragleave="this.classList.remove('drop-target')" ondrop="tableDropRow(event,'${gk}')"`
      :'';
    html+=`<tr class="subtotal-row" ${dropAttrs}>
      <td colspan="4">${subLabel}${isDroppable?' <span style="font-size:9px;color:var(--text3);font-weight:400;margin-left:6px;">drop here</span>':''}</td>
      ${subCells}
      <td class="num">${fmtK(st.arr)}</td>
      <td></td>
    </tr>`;
  });

  // Recalc grand total cleanly
  const g2={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};
  sorted.forEach(d=>{const c=getCol(d.closeDate);if(g2[c]!==undefined)g2[c]+=d.arr||0;g2.arr+=d.arr||0;});
  const gtCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${g2[c]?fmtK(g2[c]):''}</td>`).join('');
  html+=`<tr class="total-row">
    <td colspan="4" style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Grand total</td>
    ${gtCells}
    <td class="num">${fmtK(g2.arr)}</td>
    <td></td>
  </tr>`;

  return`<div class="panel-header">
    <div class="panel-title">${{tier:'By tier',status:'By status',arr:'By ARR'}[currentView]||'Deals'}</div>
    <div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;">${fmtK(g2.arr)} total ARR</div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:52px">Status</th>
      <th style="width:36px">Tier</th>
      <th style="width:155px">Deal</th>
      <th style="width:85px">Stage</th>
      <th class="num" style="width:55px">Mar</th>
      <th class="num" style="width:55px">Apr</th>
      <th class="num" style="width:55px">May</th>
      <th class="num" style="width:55px">Jun</th>
      <th class="num" style="width:55px">Q3+</th>
      <th class="num" style="width:55px">ARR</th>
      <th style="width:165px">Next move</th>
    </tr></thead>
    <tbody>${html}</tbody>
  </table></div>`;
}

async function tableDropRow(e,groupKey){
  e.preventDefault();
  document.querySelectorAll('.subtotal-row').forEach(r=>r.classList.remove('drop-target'));
  if(tableDragId===null)return;
  const d=deals.find(x=>x.id===tableDragId);
  if(d){
    if(currentView==='tier'){
      d.tier=parseInt(groupKey);
    } else if(currentView==='status'){
      d.sentiment=String(groupKey);
    }
    if(activeDeal&&activeDeal.id===d.id){
      activeDeal=d;
      document.getElementById('side-meta').textContent=`Tier ${d.tier} · ${fmtK(d.arr)} ARR · ${d.stage||''}`;
      renderSide();
    }
    await saveOneDeal(d);
    render();
  }
  tableDragId=null;
}
function dropCard(e,newSentiment,newTier){
  e.preventDefault();
  document.querySelectorAll('.grid-box').forEach(b=>b.classList.remove('drag-over'));
  if(dragDealId===null)return;
  const d=deals.find(x=>x.id===dragDealId);
  if(d){
    d.sentiment=newSentiment;
    d.tier=newTier;
    if(activeDeal&&activeDeal.id===d.id){
      activeDeal=d;
      document.getElementById('side-meta').textContent=`Tier ${d.tier} · ${fmtK(d.arr)} ARR · ${d.stage||''}`;
      renderSide();
    }
    saveOneDeal(d);
    renderGridView();
  }
  dragDealId=null;
}


let schedWeekOffset=0;

function getSchedMonday(offset){
  const now=new Date();
  const day=now.getDay();
  const diff=now.getDate()-day+(day===0?-6:1);
  const mon=new Date(now);
  mon.setDate(diff+(offset*7));
  mon.setHours(0,0,0,0);
  return mon;
}

function getSchedWeekKey(offset){
  const d=getSchedMonday(offset);
  return`sched-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatSchedWeek(offset){
  const mon=getSchedMonday(offset);
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  return`${MONTHS[mon.getMonth()]} ${mon.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}, ${fri.getFullYear()}`;
}

async function setActivity(dealId,day,val){
  const wk=getSchedWeekKey(schedWeekOffset);
  if(!schedule[wk])schedule[wk]={};
  const key=`${dealId}__${day}`;
  const existing=schedule[wk][key];
  const existingRowId=existing?.rowId;
  const newRowId=await saveScheduleActivity(dealId,day,wk,val,existingRowId);
  if(val){
    schedule[wk][key]={activity:val,rowId:newRowId||existingRowId};
  } else {
    delete schedule[wk][key];
  }
  const cell=document.getElementById(`cell-${dealId}-${day}`);
  if(cell)cell.innerHTML=cellInner(dealId,day,val);
}

function cellInner(dealId,day,val){
  const activity=typeof val==='object'?val?.activity:val;
  if(!activity){
    return`<select class="act-select" onchange="setActivity(${dealId},'${day}',this.value)">
      <option value="">—</option>
      <option value="meeting">Meeting</option>
      <option value="called">Called</option>
      <option value="emailed">Emailed</option>
    </select>`;
  }
  const label=activity.charAt(0).toUpperCase()+activity.slice(1);
  return`<span class="act-chip chip-${activity}" onclick="clearActivity(${dealId},'${day}')" title="Click to clear">${label}</span>`;
}

async function clearActivity(dealId,day){
  const wk=getSchedWeekKey(schedWeekOffset);
  const key=`${dealId}__${day}`;
  const existing=schedule[wk]?.[key];
  await saveScheduleActivity(dealId,day,wk,'',existing?.rowId);
  if(schedule[wk])delete schedule[wk][key];
  const cell=document.getElementById(`cell-${dealId}-${day}`);
  if(cell)cell.innerHTML=cellInner(dealId,day,'');
}

function renderScheduleView(){
  const wk=getSchedWeekKey(schedWeekOffset);
  if(!schedule[wk])schedule[wk]={};
  const sorted=[...deals].sort((a,b)=>a.tier-b.tier||b.arr-a.arr);
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];

  const rows=sorted.map(d=>{

    }).join('');

    return`<tr class="srow-${d.sentiment}">
      <td style="width:28px;padding:5px 8px;"><div style="display:flex;align-items:center;gap:5px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}" style="height:20px;"></div><span class="tier-num">${d.tier}</span></div></td>
      <td class="sched-deal-name" style="overflow:hidden;text-overflow:ellipsis;cursor:pointer;" onclick="openDeal(${d.id})">${d.name}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header">
      <div class="panel-title">Schedule</div>
      <div class="sched-nav">
        <button class="sched-wk-btn" onclick="schedWeekOffset--;renderScheduleView()">‹</button>

        <button class="sched-wk-btn" onclick="schedWeekOffset++;renderScheduleView()">›</button>

// ── SCENARIO PLANNING ──
let scenarioChecked = new Set(); // deal ids checked in scenario

function toggleScenario(id){
  if(scenarioChecked.has(id)) scenarioChecked.delete(id);
  else scenarioChecked.add(id);
  renderScenarioView();
}

function renderScenarioView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const sorted=[...deals].sort((a,b)=>a.tier-b.tier||b.arr-a.arr);

  // Calculate sums
  const sums={mar:0,apr:0,may:0,jun:0,q3:0,total:0};
  deals.filter(d=>scenarioChecked.has(d.id)).forEach(d=>{
    const col=getCol(d.closeDate);
    if(sums[col]!==undefined)sums[col]+=d.arr||0;
    sums.total+=d.arr||0;
  });

  const colLabels={mar:'Mar',apr:'Apr',may:'May',jun:'Jun',q3:'Q3+'};
  const summaryCards=Object.entries(colLabels).map(([k,label])=>`
    <div class="scenario-card${sums[k]?' has-value':''}">
      <div class="scenario-card-label">${label}</div>
      <div class="scenario-card-value">${sums[k]?fmtK(sums[k]):'—'}</div>
    </div>`).join('');

  const totalCard=`<div class="scenario-card total-card">
    <div class="scenario-card-label">Selected total</div>
    <div class="scenario-card-value">${sums.total?fmtK(sums.total):'—'}</div>
  </div>`;

  const tiers=[...new Set(sorted.map(d=>d.tier))].sort();
  let rows='';

  tiers.forEach(tier=>{
    const group=sorted.filter(d=>d.tier===tier);
    const st={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};

    group.forEach(d=>{
      const col=getCol(d.closeDate);
      if(st[col]!==undefined)st[col]+=d.arr||0;
      st.arr+=d.arr||0;

      const isChecked=scenarioChecked.has(d.id);
      const isActive=activeDeal&&activeDeal.id===d.id;
      const flags=getFlagDots(d.sentiment);
      const flagHtml=`<div class="flags">${flags.map(f=>`<div class="flag ${f}"></div>`).join('')}</div>`;
      const cells=MONTH_COLS.concat(['q3']).map(c=>{
        if(c===col&&d.arr)return`<td class="num"><span class="arr-pill">${fmtK(d.arr)}</span></td>`;
        return`<td class="num"></td>`;
      }).join('');

      rows+=`<tr class="row-${d.sentiment}${isActive?' active-row':''}" style="${isChecked?'':'opacity:0.6;'}">
        <td style="width:36px;text-align:center;"><input type="checkbox" class="scenario-cb" ${isChecked?'checked':''} onclick="event.stopPropagation();toggleScenario(${d.id})"></td>
        <td onclick="openDeal(${d.id})" style="cursor:pointer;"><div style="display:flex;align-items:center;gap:6px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}"></div><span class="tier-num">${d.tier}</span></div></td>
        <td class="deal-name-${d.sentiment}" onclick="openDeal(${d.id})" style="cursor:pointer;">${d.name}</td>
        <td onclick="openDeal(${d.id})" style="cursor:pointer;"><span class="stage-badge stage-${d.sentiment}">${d.stage||''}</span></td>
        ${cells}
        <td class="num" style="font-weight:500;font-family:'DM Mono',monospace;">${fmtK(d.arr)}</td>
      </tr>`;
    });

    const subCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${st[c]?fmtK(st[c]):''}</td>`).join('');
    rows+=`<tr class="subtotal-row">
      <td></td>
      <td colspan="3">Tier ${tier} — ${group.length} deal${group.length!==1?'s':''}</td>
      ${subCells}
      <td class="num">${fmtK(st.arr)}</td>
    </tr>`;
  });

  // Grand total
  const g2={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};
  sorted.forEach(d=>{const c=getCol(d.closeDate);if(g2[c]!==undefined)g2[c]+=d.arr||0;g2.arr+=d.arr||0;});
  const gtCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${g2[c]?fmtK(g2[c]):''}</td>`).join('');
  rows+=`<tr class="total-row">
    <td></td>
    <td colspan="3" style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Pipeline total</td>
    ${gtCells}
    <td class="num">${fmtK(g2.arr)}</td>
  </tr>`;

  const checkedCount=scenarioChecked.size;
  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header">
      <div class="panel-title">Scenario planning</div>
      <div style="font-size:12px;color:var(--text2);">${checkedCount} deal${checkedCount!==1?'s':''} selected</div>
    </div>
    <div class="scenario-summary">${summaryCards}${totalCard}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:36px"></th>
          <th style="width:36px">Tier</th>
          <th style="width:155px">Deal</th>
          <th style="width:85px">Stage</th>
          <th class="num" style="width:55px">Mar</th>
          <th class="num" style="width:55px">Apr</th>
          <th class="num" style="width:55px">May</th>
          <th class="num" style="width:55px">Jun</th>
          <th class="num" style="width:55px">Q3+</th>
          <th class="num" style="width:55px">ARR</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── PATTERNS ── */
const PATTERNS=[
  {test:s=>s.every(x=>x==='convinced'),name:'Close-ready',read:'All four dimensions confirmed. Deal is yours to lose.',move:'Drive MAP and compress paper process. Protect champion from internal drift.'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]==='convinced'&&s[3]!=='convinced',name:'Conviction without a path',read:'Strong belief across capability, impact, and urgency — but no clear path to close.',move:'Schedule a process call with procurement or legal. Don\'t let the champion shield you.'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]==='unaware',name:'Believers without a deadline',read:'Strong product conviction but no urgency created.',move:'Find or create a compelling event. Ask EB: what happens if this isn\'t solved by Q3?'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]!=='convinced',name:'Strong on substance, weak on close',read:'Capability and impact confirmed, but urgency is missing.',move:'Qualify urgency with EB directly. Champion conviction without EB urgency doesn\'t close.'},
  {test:s=>s[0]==='convinced'&&s[1]==='unaware',name:'Feature believer, not a buyer',read:'Capability confirmed but impact not yet personal.',move:'Stop demoing. Ask: what does your team do today when this breaks?'},
  {test:s=>s[2]==='convinced'&&s[0]!=='convinced',name:'Urgency without capability belief',read:'Real deadline present — but capability unconfirmed.',move:'Slow down. Validate capability before letting timing drive the process.'},
  {test:s=>s.every(x=>x==='exploring'),name:'Broad exploration, no anchor',read:'Active across all four — nothing resolved. Looks like momentum, might be drift.',move:'Pick one dimension and drive it to Convinced. Capability closes fastest.'},
  {test:s=>s[0]==='unaware'&&(s[1]==='exploring'||s[2]==='exploring'||s[3]==='exploring'),name:'Exploring without a foundation',read:'Engaged on multiple dimensions but capability unconfirmed.',move:'Anchor capability confirmation before advancing other conversations.'},
  {test:s=>s[0]==='convinced'&&s[1]!=='convinced',name:'Early stage — capability confirmed',read:'Good foundation. Now the deal needs to become personal.',move:'Move to impact. Get a specific before/after story they personally own.'},
  {test:s=>s.every(x=>x==='unaware'),name:'Pre-discovery',read:'No conviction established on any dimension.',move:'Start with capability. Confirm fit before exploring impact.'},
];

function diagnose(states){
  for(const p of PATTERNS)if(p.test(states))return p;
  const dims=['Capability','Impact','Urgency','Path'];
  const stuck=dims.filter((_,i)=>states[i]==='unaware');
  return{name:'Mixed conviction',read:'Some dimensions moving.'+(stuck.length?' '+stuck.join(' and ')+' not yet engaged.':''),move:'Focus on lowest-state dimension. Drive it to Exploring before spreading attention.'};
}

  {label:'Path',q:'"Can we actually get this done?"'},
];

async function deleteDeal(){
  if(!activeDeal)return;
  if(!confirm(`Delete "${activeDeal.name}"? This cannot be undone.`))return;
  const id=activeDeal.id;
  try{
    await sbDelete('deals',`id=eq.${id}`);
    deals=deals.filter(d=>d.id!==id);
    closeSide();
    render();
    setStatus('Deal deleted','ok');
  }catch(e){
    setStatus('Delete error: '+e.message,'error');
  }
}

async function setState(dimIdx,state){
  if(!activeDeal)return;
  const keys=['capability','impact','urgency','path'];
  const d=deals.find(x=>x.id===activeDeal.id);
  if(d){d[keys[dimIdx]]=state;activeDeal=d;}
  await saveOneDeal(activeDeal);
  renderConviction();
}

function updateField(key,val){
  if(!activeDeal)return;
  const d=deals.find(x=>x.id===activeDeal.id);
  if(d){d[key]=val;activeDeal=d;}
}

async function saveDeal(){

  render();

let dealHistories={};

async function loadDealHistory(dealId){
  try{
    const rows=await sbGet('deal_histories',`deal_id=eq.${dealId}&order=created_at.asc`);
    dealHistories[String(dealId)]=rows.map(r=>({role:r.role,content:r.content,sbId:r.id}));
  }catch(e){dealHistories[String(dealId)]=[];}
}

async function saveDealHistories(){
  // no-op: individual messages are saved inline in askClaude
}

function renderChatHistory(history){
  const el=document.getElementById('ask-resp');
  if(!el)return;
  if(!history||history.length===0){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=history.map(m=>{
    const isUser=m.role==='user';
    return`<div style="margin-bottom:10px;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:${isUser?'var(--text3)':'var(--green-text)'};margin-bottom:3px;">${isUser?'You':'Coach'}</div>
      <div style="font-size:12px;line-height:1.6;color:${isUser?'var(--text2)':'var(--text)'};">${m.content.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">');
  el.scrollTop=el.scrollHeight;
}

async function askClaude(){
  if(!activeDeal)return;
  const d=activeDeal;
  const inp=document.getElementById('ask-input');
  const userMsg=inp?inp.value.trim():'';

  const states=[d.capability||'unaware',d.impact||'unaware',d.urgency||'unaware',d.path||'unaware'];
  const p=diagnose(states);

  const dealKey=String(d.id);
  if(!dealHistories[dealKey])dealHistories[dealKey]=[];
  const history=dealHistories[dealKey];

  const systemPrompt=`You are an expert B2B sales coach helping a rep manage a specific deal. Here is the current deal context — refer back to this throughout the conversation:

Deal: ${d.name}
ARR: ${fmtK(d.arr)}
Stage: ${d.stage}
Close date: ${d.closeDate||'unknown'}
Rep notes: ${d.notes||'None'}
Conviction map:
- Capability (Can it do what I need?): ${states[0]}
- Impact (Will it actually change things?): ${states[1]}
- Urgency (Is now the right time?): ${states[2]}
- Path (Can we get this done?): ${states[3]}
Current pattern: ${p.name}
Suggested next move: ${p.move}

You have memory of this conversation. Be direct, specific, and tactical. Reference prior messages when relevant.`;

  // First message auto-prompt if history is empty
  const firstMsg=history.length===0&&!userMsg
    ?`Give me 3 specific questions I should ask on my next call to advance the weakest conviction dimension.`
    :userMsg;

  if(!firstMsg)return;
  if(inp)inp.value='';

  history.push({role:'user',content:firstMsg});
  renderChatHistory(history);

  const respEl=document.getElementById('ask-resp');
  if(respEl){
    respEl.style.display='block';
    // Add thinking indicator to last entry
    const thinking=document.createElement('div');
    thinking.id='thinking-indicator';
    thinking.style.cssText='font-size:11px;color:var(--text3);font-style:italic;margin-top:6px;';
    thinking.textContent='Thinking...';
    respEl.appendChild(thinking);
  }

  try{
    // Save user message to DB
    try{
      const uRows=await sbInsert('deal_histories',{deal_id:d.id,role:'user',content:firstMsg});
      history[history.length-1].sbId=uRows[0]?.id;
    }catch(e){console.warn('History save error',e);}

    const messages=history.map(m=>({role:m.role,content:m.content}));
    const res=await fetch('/.netlify/functions/ask-claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:systemPrompt,
        messages
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const reply=data.content?.find(b=>b.type==='text')?.text||'No response from Claude.';
    history.push({role:'assistant',content:reply});

    // Save assistant message to DB
    try{
      const aRows=await sbInsert('deal_histories',{deal_id:d.id,role:'assistant',content:reply});
      history[history.length-1].sbId=aRows[0]?.id;
    }catch(e){console.warn('History save error',e);}

    renderChatHistory(history);
  }catch(e){
    const errMsg='Error: '+e.message;
    history.push({role:'assistant',content:errMsg});
    renderChatHistory(history);
  }
}

async function clearDealHistory(){
  if(!activeDeal)return;
  const dealKey=String(activeDeal.id);
  try{
    await sbDelete('deal_histories',`deal_id=eq.${activeDeal.id}`);
    delete dealHistories[dealKey];
  }catch(e){console.warn('Clear history error',e);}
  document.getElementById('ask-resp').style.display='none';
}

/* ── CSV IMPORT ── */
document.getElementById('csv-input').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    function parseCSVLine(line){
      const result=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){inQ=!inQ;}
        else if(c===','&&!inQ){result.push(cur.trim());cur='';}
        else{cur+=c;}
      }
      result.push(cur.trim());
      return result;
    }
    function cleanNum(s){return parseFloat((s||'').replace(/[$,\s]/g,''))||0;}
    function cleanDate(s){return(s||'').trim().split(' ')[0];}

    const lines=ev.target.result.trim().split(/\r?\n/);
    const headers=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
    let imported=0;
    setStatus('Importing...','info');
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=parseCSVLine(lines[i]);
      const row={};headers.forEach((h,j)=>row[h]=(vals[j]||'').replace(/^"|"$/g,'').trim());
      const name=row['dealname']||row['name']||row['deal']||'';
      if(!name)continue;
      const hubFields={
        name,
        closeDate:cleanDate(row['closedate']||row['close']||''),
        stage:row['dealstage']||row['stage']||'',
        amount:cleanNum(row['amount']),
        arr:cleanNum(row['arr'])||cleanNum(row['amount']),
      };
      const existing=deals.find(d=>d.name.toLowerCase()===name.toLowerCase());
      try{
        if(existing){
          Object.assign(existing,hubFields);
          await saveOneDeal(existing);
        } else {
          const newDeal={...hubFields,tier:4,sentiment:'y',pattern:'',nextMove:'',nstw:'',capability:'unaware',impact:'unaware',urgency:'unaware',path:'unaware',notes:''};
          const inserted=await sbInsert('deals',dealToDb(newDeal));
          newDeal.id=inserted[0].id;
          deals.push(newDeal);
        }
        imported++;
      }catch(e){console.warn('Import error for '+name,e);}
    }
    render();
    setStatus(`${imported} deals imported`,'ok');
  };
  reader.readAsText(file);e.target.value='';
});

// ── INIT ──
async function init(){
  // Show loading state but keep tabs interactive
  document.getElementById('main-panel').innerHTML='<div style="padding:2rem;color:var(--text3);font-size:13px;">Loading pipeline...</div>';
  try{
    await Promise.all([loadDeals(), loadSchedule()]);
  }catch(e){
    console.warn('Init error',e);
    deals=[];
  }
  render();
}

init();
</script>
