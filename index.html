<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E4E2DC;--border2:#D0CEC6;
    --text:#1A1916;--text2:#6B6860;--text3:#9E9C96;
    --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--green-row:#F0FAF6;
    --yellow:#EF9F27;--yellow-bg:#FAEEDA;--yellow-text:#633806;--yellow-row:#FDF6E8;
    --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#791F1F;--red-row:#FDF0F0;
    --gray:#888780;--radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  /* Nav */
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;}
  .nav-brand{font-size:14px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .nav-brand span{font-weight:300;color:var(--text2);}
  .nav-actions{display:flex;gap:8px;align-items:center;}
  .btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--surface2);}
  .import-msg{font-size:11px;color:var(--green);font-weight:500;}

  /* View tabs */
  .view-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:flex-end;gap:0;flex-shrink:0;height:40px;}
  .view-tab{font-family:'DM Sans',sans-serif;font-size:12px;padding:0 16px;height:40px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap;}
  .view-tab:hover{color:var(--text);}
  .view-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}

  /* Layout */
  .layout{display:flex;flex:1;overflow:hidden;}
  .main-panel{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;}
  .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .panel-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  table{width:100%;border-collapse:collapse;table-layout:fixed;}
  thead th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;}
  thead th.num{text-align:right;}
  tbody tr{cursor:pointer;border-bottom:1px solid var(--border);}
  tbody tr:last-child{border-bottom:none;}
  tr.row-unset td{background:var(--surface2);}
  tr.row-g td{background:var(--green-row);}
  tr.row-y td{background:var(--yellow-row);}
  tr.row-r td{background:var(--red-row);}
  tr.row-g:hover td{background:#e5f7f1;}
  tr.row-y:hover td{background:#faf0d8;}
  tr.row-r:hover td{background:#fae5e5;}
  tr.active-row.row-g td{background:#ddf4ec;}
  tr.active-row.row-y td{background:#f7eccb;}
  tr.active-row.row-r td{background:#f7dede;}
  td{padding:5px 12px;font-size:11px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td.num{text-align:right;}
  .deal-name-g{color:var(--green-text)!important;font-weight:500;}
  .deal-name-y{color:var(--yellow-text)!important;font-weight:500;}
  .deal-name-r{color:var(--red-text)!important;font-weight:500;}
  .stage-badge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .stage-unset{background:var(--surface2);color:var(--text3);border-color:var(--border2);}
  .stage-g{background:var(--green-bg);color:var(--green-text);border-color:#9FE1CB;}
  .stage-y{background:var(--yellow-bg);color:var(--yellow-text);border-color:#FAC775;}
  .stage-r{background:var(--red-bg);color:var(--red-text);border-color:#F7C1C1;}
  .tier-stripe{width:3px;height:16px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:6px;}
  .stripe-1{background:var(--green);}.stripe-2{background:var(--yellow);}.stripe-3{background:var(--red);}.stripe-4{background:var(--gray);}
  .tier-num{font-size:10px;font-weight:600;color:var(--text3);font-family:'DM Mono',monospace;}
  .flags{display:flex;gap:3px;}
  .flag{width:8px;height:8px;border-radius:50%;}
  .flag-g{background:var(--green);}.flag-y{background:var(--yellow);}.flag-r{background:var(--red);}.flag-e{background:var(--border2);}
  .arr-pill{display:inline-block;background:var(--green-bg);color:var(--green-text);font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;}
  .subtotal-row td{background:var(--surface2)!important;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--border2);border-bottom:2px solid var(--border2);padding:4px 12px;cursor:default;}
  .subtotal-row:hover td{background:var(--surface2)!important;}
  .subtotal-row.drop-target td{background:var(--yellow-bg)!important;outline:2px dashed var(--yellow);}
  .subtotal-row td.num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);}
  .total-row td{background:var(--surface2)!important;font-weight:500;font-size:10px;color:var(--text2);border-top:2px solid var(--border2);cursor:default;padding:4px 12px;}
  .total-row:hover td{background:var(--surface2)!important;}
  .total-row td.num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);}
  .next-move-cell{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text;}
  .next-move-cell:hover{color:var(--text);background:var(--surface2);border-radius:4px;}
  .next-move-input{font-family:'DM Sans',sans-serif;font-size:11px;width:100%;padding:2px 4px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);outline:none;}
  .next-move-input:focus{border-color:var(--text2);}

  /* 12-box grid */
  .grid-wrap{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
  .grid-col-header{font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:6px 0;display:flex;align-items:center;justify-content:center;gap:5px;}
  .grid-row-label{display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  .grid-row-label.rl-g{color:var(--green-text);}
  .grid-row-label.rl-y{color:var(--yellow-text);}
  .grid-row-label.rl-r{color:var(--red-text);}
  .grid-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);min-height:60px;padding:7px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;align-content:start;}
  .grid-box.box-g1{border-color:#9FE1CB;background:#F5FCF9;}
  .grid-box.box-g2{border-color:#C0DD97;background:#F7FAF2;}
  .grid-box.box-g3{border-color:var(--border);background:var(--surface);}
  .grid-box.box-g4{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-y1{border-color:#FAC775;background:#FDFAF3;}
  .grid-box.box-y2{border-color:var(--border);background:var(--surface);}
  .grid-box.box-y3{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-y4{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-r1{border-color:var(--border);background:var(--surface);}
  .grid-box.box-r2{border-color:var(--border);background:var(--surface2);}
  .grid-box.box-r3{border-color:#F7C1C1;background:#FDF5F5;}
  .grid-box.box-r4{border-color:#F0A0A0;background:#FDF0F0;}
  .deal-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 7px;cursor:grab;transition:all .12s;}
  .deal-card:hover{border-color:var(--border2);background:var(--surface2);}
  .deal-card.active-card{border-color:var(--border2);background:var(--surface2);}
  .deal-card:active{cursor:grabbing;opacity:0.7;}
  .grid-box.drag-over{border-color:var(--border2) !important;outline:2px dashed var(--border2);}
  .dc-name{font-size:10px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dc-arr{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);}
  .dc-stage{font-size:10px;color:var(--text3);}
  .grid-empty{font-size:10px;color:var(--text3);text-align:center;padding:8px 0;grid-column:1/-1;}

  /* Schedule */
  .sched-nav{display:flex;align-items:center;gap:8px;}
  .sched-wk-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .12s;}
  .sched-wk-btn:hover{background:var(--surface2);}
  .sched-week-label{font-size:13px;font-weight:500;}
  .sched-table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .sched-table thead th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;}
  .sched-table thead th.day-col-h{text-align:center;}
  .sched-table tbody tr{border-bottom:1px solid var(--border);}
  .sched-table tbody tr:last-child{border-bottom:none;}
  .sched-table td{padding:5px 8px;font-size:12px;vertical-align:middle;overflow:hidden;white-space:nowrap;}
  .sched-table td.day-cell{text-align:center;padding:4px 6px;}
  tr.srow-g td{background:var(--green-row);}
  tr.srow-y td{background:var(--yellow-row);}
  tr.srow-r td{background:var(--red-row);}
  tr.srow-g td.sched-deal-name{color:var(--green-text);font-weight:500;}
  tr.srow-y td.sched-deal-name{color:var(--yellow-text);font-weight:500;}
  tr.srow-r td.sched-deal-name{color:var(--red-text);font-weight:500;}
  .act-select{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 6px;border-radius:var(--radius);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);width:100%;text-align:center;transition:all .12s;appearance:none;-webkit-appearance:none;}
  .act-select:hover{border-color:var(--border2);background:var(--surface);}
  .act-select:focus{outline:none;border-color:var(--border2);}
  .act-chip{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;width:100%;text-align:center;cursor:pointer;}
  .chip-meeting{background:var(--green-bg);color:var(--green-text);}
  .chip-called{background:var(--yellow-bg);color:var(--yellow-text);}
  .chip-emailed{background:#E6F1FB;color:#185FA5;}
  .cell-wrap{min-height:28px;display:flex;align-items:center;justify-content:center;}

  /* Side panel */
  .side{width:400px;min-width:400px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .side-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
  .side-deal-name{font-size:15px;font-weight:600;letter-spacing:-0.02em;margin-bottom:3px;}
  .side-meta{font-size:11px;color:var(--text2);}
  .side-close{position:absolute;right:1rem;top:1rem;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);line-height:1;}
  .side-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .side-tab{flex:1;padding:10px;font-size:12px;font-family:'DM Sans',sans-serif;border:none;background:transparent;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
  .side-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
  .side-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;}

  /* Conviction UI */
  .field-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
  .tier-selector{display:flex;gap:6px;margin-bottom:14px;}
  .tier-opt{flex:1;padding:7px 6px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;text-align:center;transition:all .12s;color:var(--text2);}
  .tier-opt:hover{background:var(--surface2);}
  .tier-opt.active-t1{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .tier-opt.active-t2{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .tier-opt.active-t3{background:var(--red-bg);border-color:#A32D2D;color:var(--red-text);}
  .tier-opt.active-t4{background:var(--surface2);border-color:var(--gray);color:var(--text2);}
  .status-selector{display:flex;gap:6px;margin-bottom:14px;}
  .status-opt{flex:1;padding:7px 6px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;text-align:center;transition:all .12s;color:var(--text2);}
  .status-opt:hover{background:var(--surface2);}
  .status-opt.active-g{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .status-opt.active-y{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .status-opt.active-r{background:var(--red-bg);border-color:#A32D2D;color:var(--red-text);}
  .dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .dim-card{background:var(--surface2);border-radius:var(--radius);padding:10px;border:1px solid var(--border);}
  .dim-label{font-size:11px;font-weight:600;margin-bottom:2px;}
  .dim-q{font-size:10px;color:var(--text2);margin-bottom:8px;line-height:1.4;font-style:italic;}
  .state-btns{display:flex;flex-direction:column;gap:3px;}
  .sb{font-size:11px;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);text-align:left;transition:all .12s;}
  .sb:hover{background:var(--surface);}
  .sb.au{background:#F1EFE8;border-color:#5F5E5A;color:#444441;}
  .sb.ae{background:var(--yellow-bg);border-color:#854F0B;color:var(--yellow-text);}
  .sb.ac{background:var(--green-bg);border-color:#0F6E56;color:var(--green-text);}
  .cbar{display:flex;gap:2px;margin-top:8px;}
  .cs{height:3px;flex:1;border-radius:2px;background:var(--border);}
  .cs.fu{background:var(--gray);}.cs.fe{background:var(--yellow);}.cs.fc{background:var(--green);}
  .diag-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
  .diag-pat{font-size:12px;font-weight:600;margin-bottom:4px;}
  .diag-read{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:8px;}
  .diag-move-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px;}
  .diag-move{font-size:12px;line-height:1.55;}
  .field-row{margin-bottom:10px;}
  input[type=text],textarea,select{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--text2);}
  textarea{resize:vertical;min-height:64px;}
  .ask-btn{width:100%;margin-top:8px;padding:8px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;}
  .ask-btn:hover{background:var(--surface2);}
  .ask-resp{margin-top:8px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;line-height:1.6;color:var(--text2);}
  .save-btn{width:100%;margin-top:12px;padding:9px;border-radius:var(--radius);border:none;background:var(--text);color:white;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .12s;}
  .save-btn:hover{background:#2C2C2A;}


  /* Scenario planning */
  .scenario-summary{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px;margin-bottom:1rem;}
  .scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;}
  .scenario-card.has-value{border-color:#9FE1CB;background:var(--green-bg);}
  .scenario-card-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;}
  .scenario-card-value{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);letter-spacing:-0.02em;}
  .scenario-card.has-value .scenario-card-label{color:var(--green-text);}
  .scenario-card.has-value .scenario-card-value{color:var(--green-text);}
  .scenario-card.total-card{border-color:var(--border2);background:var(--surface2);}
  .scenario-card.total-card .scenario-card-value{font-size:20px;}
  .scenario-cb{width:15px;height:15px;cursor:pointer;accent-color:var(--green);flex-shrink:0;}

  /* Quota bar */
  .quota-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:2rem;height:44px;flex-shrink:0;}
  .quota-stat{display:flex;align-items:baseline;gap:6px;}
  .quota-stat-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
  .quota-stat-value{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);}
  .quota-stat-value.green{color:var(--green-text);}
  .quota-stat-value.yellow{color:var(--yellow-text);}
  .quota-stat-value.red{color:var(--red-text);}
  .quota-progress-wrap{flex:1;max-width:200px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
  .quota-progress-fill{height:100%;border-radius:3px;transition:width .3s;}
  .quota-edit-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;font-family:'DM Sans',sans-serif;}
  .quota-edit-btn:hover{color:var(--text2);}
  .quota-edit-wrap{display:flex;align-items:center;gap:6px;}
  .quota-input{font-family:'DM Mono',monospace;font-size:12px;padding:3px 8px;border:1px solid var(--border2);border-radius:var(--radius);width:80px;background:var(--surface);color:var(--text);}

  /* Metrics */
  .metrics-table{width:100%;border-collapse:collapse;table-layout:auto;}
  .metrics-table th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);text-align:center;white-space:nowrap;}
  .metrics-table th.metric-name-h{text-align:left;width:180px;}
  .metrics-table th.goal-h{text-align:center;width:60px;}
  .metrics-table td{padding:5px 10px;font-size:12px;vertical-align:middle;border-bottom:1px solid var(--border);text-align:center;}
  .metrics-table td.metric-name{text-align:left;font-weight:500;font-size:12px;color:var(--text);}
  .metrics-table td.metric-goal{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;cursor:text;}
  .metrics-table td.metric-goal:hover{background:var(--surface2);border-radius:4px;color:var(--text);}
  .metrics-table tr.metric-group-header td{background:var(--surface2);font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:5px 12px;border-top:2px solid var(--border2);}
  .metric-actual{font-size:12px;font-family:'DM Mono',monospace;font-weight:500;}
  .metric-pct{font-size:10px;margin-top:1px;}
  .m-green{color:var(--green-text);background:var(--green-bg);border-radius:4px;padding:2px 6px;}
  .m-yellow{color:var(--yellow-text);background:var(--yellow-bg);border-radius:4px;padding:2px 6px;}
  .m-red{color:var(--red-text);background:var(--red-bg);border-radius:4px;padding:2px 6px;}
  .m-empty{color:var(--text3);}
  .metric-auto{font-size:10px;color:var(--text3);font-style:italic;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<nav class="nav">

const SB_HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{...SB_HEADERS,'Accept':'application/json'}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, params){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:SB_HEADERS});
  if(!r.ok)throw new Error(await r.text());
}

// Map DB row -> app deal object
function dbToDeal(r){
  return{id:r.id,name:r.name,stage:r.stage||'',amount:r.amount||0,arr:r.arr||0,closeDate:r.close_date||'',
    tier:r.tier||null,sentiment:r.sentiment||null,pattern:r.pattern||'',nextMove:r.next_move||'',
    nstw:r.nstw||'',capability:r.capability||'unaware',impact:r.impact||'unaware',
    urgency:r.urgency||'unaware',path:r.path||'unaware',notes:r.notes||''};
}
// Map app deal -> DB fields (no id)
function dealToDb(d,snapshotId){
  return{name:d.name,stage:d.stage,amount:d.amount||0,arr:d.arr||0,close_date:d.closeDate||null,
    tier:d.tier||null,sentiment:d.sentiment||null,pattern:d.pattern||'',next_move:d.nextMove||'',
    nstw:d.nstw||'',capability:d.capability||'unaware',impact:d.impact||'unaware',urgency:d.urgency||'unaware',
    path:d.path||'unaware',notes:d.notes||'',updated_at:new Date().toISOString(),
    snapshot_id:snapshotId||activeSnapshotId||null};
}

let deals=[];
let schedule={};
let snapshots=[];        // [{id, week_label, week_date}]
let activeSnapshotId=null;
let isReadOnly=false;
let activeDeal=null;
let sideTab='conviction';
let currentView='tier';
let dbLoaded=false;

function setStatus(msg,type='info'){
  const el=document.getElementById('import-status');
  if(!el)return;
  el.textContent=msg;
  el.style.display=msg?'block':'none';
  el.style.color=type==='error'?'var(--red)':type==='ok'?'var(--green)':'var(--text2)';
  if(type==='ok'||type==='info')setTimeout(()=>{el.style.display='none';},3000);
}

async function loadSnapshots(){
  try{
    const rows=await sbGet('snapshots','select=*&order=week_date.desc');
    snapshots=rows;
    if(snapshots.length>0 && !activeSnapshotId){
      activeSnapshotId=snapshots[0].id;
      isReadOnly=false;
    }
  }catch(e){console.warn('Snapshots load error',e);}
}

async function loadDeals(){
  try{
    const param=activeSnapshotId?`snapshot_id=eq.${activeSnapshotId}`:'snapshot_id=is.null';
    const rows=await sbGet('deals',`select=*&${param}&order=tier.asc,arr.desc`);
    deals=rows.map(dbToDeal);
    dbLoaded=true;
  }catch(e){
    setStatus('DB error: '+e.message,'error');
    deals=[];
  }
}

async function switchSnapshot(id){
  const snap=snapshots.find(s=>s.id===id);
  if(!snap)return;
  activeSnapshotId=id;
  // Most recent snapshot is editable, all others read-only
  isReadOnly=snapshots[0].id!==id;
  activeDeal=null;
  document.getElementById('sidepanel').style.display='none';
  await loadDeals();
  render();
  renderQuotaBar();
  renderSnapshotSelector();
}

function renderSnapshotSelector(){
  const el=document.getElementById('snapshot-selector');
  if(!el||snapshots.length===0)return;
  el.innerHTML=snapshots.map(s=>`
    <option value="${s.id}" ${s.id===activeSnapshotId?'selected':''}>${s.week_label}${snapshots[0].id===s.id?' (current)':''}</option>
  `).join('');
  const badge=document.getElementById('readonly-badge');
  if(badge)badge.style.display=isReadOnly?'flex':'none';
}

function getWeekLabel(date){
  const d=date||new Date();
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(d);mon.setDate(diff);
  return`Week of ${MONTHS[mon.getMonth()]} ${mon.getDate()}`;
}

async function loadSchedule(){
  try{
    const rows=await sbGet('schedule','select=*');
    schedule={};
    rows.forEach(r=>{
      if(!schedule[r.week_key])schedule[r.week_key]={};
      schedule[r.week_key][`${r.deal_id}__${r.day}`]={activity:r.activity,rowId:r.id};
    });
  }catch(e){console.warn('Schedule load error',e);}
}


async function saveNextMove(dealId, val){
  const d=deals.find(x=>x.id===dealId);
  if(!d)return;
  d.nextMove=val;
  if(activeDeal&&activeDeal.id===dealId)activeDeal=d;
  await saveOneDeal(d);
  // Update side panel if open on this deal
  const nm=document.getElementById('f-nextmove');
  if(nm&&activeDeal&&activeDeal.id===dealId)nm.value=val;
}

function startEditNextMove(dealId, el){
  if(isReadOnly)return;
  const current=el.textContent;
  const input=document.createElement('input');
  input.className='next-move-input';
  input.value=current;
  el.replaceWith(input);
  input.focus();
  input.select();
  const finish=async()=>{
    const val=input.value.trim();
    const newTd=document.createElement('td');
    newTd.className='next-move-cell';
    newTd.title=val;
    newTd.textContent=val;
    newTd.onclick=function(){startEditNextMove(dealId,this);};
    input.replaceWith(newTd);
    await saveNextMove(dealId,val);
  };
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){input.value=current;input.blur();}
  });
}
async function saveOneDeal(d){
  if(isReadOnly){setStatus('This snapshot is read-only','error');return;}
  try{
    if(d.id&&d.id>0&&dbLoaded){
      await sbUpdate('deals',d.id,dealToDb(d));
    }
  }catch(e){setStatus('Save error: '+e.message,'error');}
}

async function saveScheduleActivity(dealId,day,weekKey,activity,existingRowId){
  try{
    if(existingRowId){
      if(activity){
        await sbUpdate('schedule',existingRowId,{activity});
      } else {
        await sbDelete('schedule',`id=eq.${existingRowId}`);
      }
    } else if(activity){
      const rows=await sbInsert('schedule',{week_key:weekKey,deal_id:dealId,day,activity});
      return rows[0]?.id;
    }
  }catch(e){console.warn('Schedule save error',e);}
}

function getCol(dateStr){
  if(!dateStr)return'q3';
  const m=MONTHS[new Date(dateStr).getMonth()].toLowerCase();
  return MONTH_COLS.includes(m)?m:'q3';
}

function fmtK(v){
  if(!v)return'';
  if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M';
  return'$'+Math.round(v/1000)+'k';
}

function getFlagDots(s){
  if(s==='g')return['flag-g','flag-g','flag-e'];
  if(s==='r')return['flag-r','flag-r','flag-e'];
  if(!s)return['flag-e','flag-e','flag-e'];
  return['flag-y','flag-e','flag-e'];
}

/* ── TABLE RENDERING ── */
function tableHTML(sorted, groupKey){
  const groups=[];
  const seen=new Set();
  sorted.forEach(d=>{
    const k=groupKey(d);
    if(!seen.has(k)){seen.add(k);groups.push(k);}
  });

  const gt={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};
  let html='';

  groups.forEach(gk=>{
    const group=sorted.filter(d=>groupKey(d)===gk);
    const st={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};

    group.forEach(d=>{
      const col=getCol(d.closeDate);
      if(st[col]!==undefined)st[col]+=d.arr||0;
      st.arr+=d.arr||0;
      if(gt[col]!==undefined)gt[col]+=d.arr||0;
      gt.arr+=d.arr||0;

      const flags=getFlagDots(d.sentiment);
      const flagHtml=`<div class="flags">${flags.map(f=>`<div class="flag ${f}"></div>`).join('')}</div>`;
      const isActive=activeDeal&&activeDeal.id===d.id;
      const nm=d.nextMove||'';
      const cells=MONTH_COLS.concat(['q3']).map(c=>{
        if(c===col&&d.arr)return`<td class="num"><span class="arr-pill">${fmtK(d.arr)}</span></td>`;
        return`<td class="num"></td>`;
      }).join('');

      const isDraggable=currentView==='tier'||currentView==='status';
      const dragAttrs=isDraggable?`draggable="true" ondragstart="tableDragStart(event,${d.id})" ondragend="tableDragEnd(event)" style="cursor:grab;"`:'';

      const rowClass=d.sentiment?`row-${d.sentiment}`:'row-unset';
      const nameClass=d.sentiment?`deal-name-${d.sentiment}`:'';
      const stageClass=d.sentiment?`stage-${d.sentiment}`:'stage-unset';
      const tierCell=d.tier
        ?`<div style="display:flex;align-items:center;gap:6px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}"></div><span class="tier-num">${d.tier}</span></div>`
        :`<div style="display:flex;align-items:center;gap:6px"><div style="width:3px;height:16px;border-radius:2px;background:var(--border2);display:inline-block;"></div><span class="tier-num" style="color:var(--border2);">—</span></div>`;

      html+=`<tr class="${rowClass}${isActive?' active-row':''}" ${dragAttrs} onclick="openDeal(${d.id})">
        <td>${flagHtml}</td>
        <td>${tierCell}</td>
        <td class="${nameClass}">${d.name}</td>
        <td><span class="stage-badge ${stageClass}">${d.stage||''}</span></td>
        ${cells}
        <td class="num" style="font-weight:500;font-family:'DM Mono',monospace;">${fmtK(d.arr)}</td>
        <td class="next-move-cell" title="${nm.replace(/"/g,'&quot;')}" onclick="startEditNextMove(${d.id},this)">${nm}</td>
      </tr>`;
    });

    const subCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${st[c]?fmtK(st[c]):''}</td>`).join('');
    const subLabel=groupKey===byTier?`Tier ${gk} — ${group.length} deal${group.length!==1?'s':''}`
      :groupKey===byStatus?({g:'On track',y:'Watch',r:'At risk'}[gk]||gk)+` — ${group.length} deal${group.length!==1?'s':''}`
      :`${group.length} deal${group.length!==1?'s':''}`;
    const isDroppable=currentView==='tier'||currentView==='status';
    const dropAttrs=isDroppable
      ?`ondragover="event.preventDefault();this.classList.add('drop-target')" ondragleave="this.classList.remove('drop-target')" ondrop="tableDropRow(event,'${gk}')"`
      :'';
    html+=`<tr class="subtotal-row" ${dropAttrs}>
      <td colspan="4">${subLabel}${isDroppable?' <span style="font-size:9px;color:var(--text3);font-weight:400;margin-left:6px;">drop here</span>':''}</td>
      ${subCells}
      <td class="num">${fmtK(st.arr)}</td>
      <td></td>
    </tr>`;
  });

  // Recalc grand total cleanly
  const g2={mar:0,apr:0,may:0,jun:0,q3:0,arr:0};
  sorted.forEach(d=>{const c=getCol(d.closeDate);if(g2[c]!==undefined)g2[c]+=d.arr||0;g2.arr+=d.arr||0;});
  const gtCells=MONTH_COLS.concat(['q3']).map(c=>`<td class="num">${g2[c]?fmtK(g2[c]):''}</td>`).join('');
  html+=`<tr class="total-row">
    <td colspan="4" style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Grand total</td>
    ${gtCells}
    <td class="num">${fmtK(g2.arr)}</td>
    <td></td>
  </tr>`;

  return`<div class="panel-header">
    <div class="panel-title">${{tier:'By tier',status:'By status',arr:'By ARR'}[currentView]||'Deals'}</div>
    <div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;">${fmtK(g2.arr)} total ARR</div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th style="width:52px">Status</th>
      <th style="width:36px">Tier</th>
      <th style="width:155px">Deal</th>
      <th style="width:85px">Stage</th>
      <th class="num" style="width:55px">Mar</th>
      <th class="num" style="width:55px">Apr</th>
      <th class="num" style="width:55px">May</th>
      <th class="num" style="width:55px">Jun</th>
      <th class="num" style="width:55px">Q3+</th>
      <th class="num" style="width:55px">ARR</th>
      <th style="width:165px">Next move</th>
    </tr></thead>
    <tbody>${html}</tbody>
  </table></div>`;
}

function byTier(d){return d.tier||99;}
function byStatus(d){return d.sentiment;}
function byArr(d){return 'all';}

/* ── VIEWS ── */
function renderTierView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const sorted=[...deals].sort((a,b)=>(a.tier||99)-(b.tier||99)||b.arr-a.arr);
  document.getElementById('main-panel').innerHTML=tableHTML(sorted,byTier);
}

function renderStatusView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const order={g:0,y:1,r:2};
  const sorted=[...deals].sort((a,b)=>(order[a.sentiment]||0)-(order[b.sentiment]||0)||b.arr-a.arr);
  document.getElementById('main-panel').innerHTML=tableHTML(sorted,byStatus);
}

function renderArrView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const sorted=[...deals].sort((a,b)=>b.arr-a.arr);
  document.getElementById('main-panel').innerHTML=tableHTML(sorted,byArr);
}

function renderConvictionView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const sorted=[...deals].sort((a,b)=>a.tier-b.tier||b.arr-a.arr);

  const stateChip=(state)=>{
    if(state==='convinced')return`<span style="font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--green-bg);color:var(--green-text);border:1px solid #9FE1CB;">Convinced</span>`;
    if(state==='exploring')return`<span style="font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--yellow-bg);color:var(--yellow-text);border:1px solid #FAC775;">Exploring</span>`;
    return`<span style="font-size:11px;padding:2px 9px;border-radius:20px;background:#F1EFE8;color:#5F5E5A;border:1px solid #D3D1C7;">Unaware</span>`;
  };

  const tiers=[...new Set(sorted.map(d=>d.tier))].sort();
  let rows='';
  tiers.forEach(tier=>{
    const group=sorted.filter(d=>d.tier===tier);
    group.forEach(d=>{
      const isActive=activeDeal&&activeDeal.id===d.id;
      const flags=getFlagDots(d.sentiment);
      const flagHtml=`<div class="flags">${flags.map(f=>`<div class="flag ${f}"></div>`).join('')}</div>`;
      rows+=`<tr class="row-${d.sentiment}${isActive?' active-row':''}" onclick="openDeal(${d.id})" style="cursor:pointer;">
        <td>${flagHtml}</td>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}"></div><span class="tier-num">${d.tier}</span></div></td>
        <td class="deal-name-${d.sentiment}">${d.name}</td>
        <td style="text-align:center;">${stateChip(d.capability||'unaware')}</td>
        <td style="text-align:center;">${stateChip(d.impact||'unaware')}</td>
        <td style="text-align:center;">${stateChip(d.urgency||'unaware')}</td>
        <td style="text-align:center;">${stateChip(d.path||'unaware')}</td>
        <td class="next-move-cell" title="${(d.nextMove||'').replace(/"/g,'&quot;')}" onclick="startEditNextMove(${d.id},this)">${d.nextMove||''}</td>
      </tr>`;
    });
    rows+=`<tr class="subtotal-row" style="cursor:default;">
      <td colspan="8" style="border-top:1px solid var(--border2);border-bottom:2px solid var(--border2);padding:4px 12px;">Tier ${tier} — ${group.length} deal${group.length!==1?'s':''}</td>
    </tr>`;
  });

  const totalArr=deals.reduce((s,d)=>s+(d.arr||0),0);
  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header">
      <div class="panel-title">Conviction</div>
      <div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;">${fmtK(totalArr)} total ARR</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:52px">Status</th>
          <th style="width:36px">Tier</th>
          <th style="width:160px">Deal</th>
          <th style="width:100px;text-align:center;">Product</th>

let schedWeekOffset=0;

function getSchedMonday(offset){
  const now=new Date();
  const day=now.getDay();
  const diff=now.getDate()-day+(day===0?-6:1);
  const mon=new Date(now);
  mon.setDate(diff+(offset*7));
  mon.setHours(0,0,0,0);
  return mon;
}

function getSchedWeekKey(offset){
  const d=getSchedMonday(offset);
  return`sched-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatSchedWeek(offset){
  const mon=getSchedMonday(offset);
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  return`${MONTHS[mon.getMonth()]} ${mon.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}, ${fri.getFullYear()}`;
}

async function setActivity(dealId,day,val){
  const wk=getSchedWeekKey(schedWeekOffset);
  if(!schedule[wk])schedule[wk]={};
  const key=`${dealId}__${day}`;
  const existing=schedule[wk][key];
  const existingRowId=existing?.rowId;
  const newRowId=await saveScheduleActivity(dealId,day,wk,val,existingRowId);
  if(val){
    schedule[wk][key]={activity:val,rowId:newRowId||existingRowId};
  } else {
    delete schedule[wk][key];
  }
  const cell=document.getElementById(`cell-${dealId}-${day}`);
  if(cell)cell.innerHTML=cellInner(dealId,day,val);
}

function cellInner(dealId,day,val){
  const activity=typeof val==='object'?val?.activity:val;
  if(!activity){
    return`<select class="act-select" onchange="setActivity(${dealId},'${day}',this.value)">
      <option value="">—</option>
      <option value="meeting">Meeting</option>
      <option value="called">Called</option>
      <option value="emailed">Emailed</option>
    </select>`;
  }
  const label=activity.charAt(0).toUpperCase()+activity.slice(1);
  return`<span class="act-chip chip-${activity}" onclick="clearActivity(${dealId},'${day}')" title="Click to clear">${label}</span>`;
}

async function clearActivity(dealId,day){
  const wk=getSchedWeekKey(schedWeekOffset);
  const key=`${dealId}__${day}`;
  const existing=schedule[wk]?.[key];
  await saveScheduleActivity(dealId,day,wk,'',existing?.rowId);
  if(schedule[wk])delete schedule[wk][key];
  const cell=document.getElementById(`cell-${dealId}-${day}`);
  if(cell)cell.innerHTML=cellInner(dealId,day,'');
}


function toggleNoTouch(dealId){
  const wk=getSchedWeekKey(schedWeekOffset);
  if(!schedule[wk])schedule[wk]={};
  const key=`notouch__${dealId}`;
  const existing=schedule[wk][key];
  if(existing){
    // uncheck — delete from DB
    saveScheduleActivity(dealId,'notouch',wk,'',existing.rowId);
    delete schedule[wk][key];
  } else {
    // check — save to DB
    saveScheduleActivity(dealId,'notouch',wk,'notouch',null).then(rowId=>{
      schedule[wk][key]={activity:'notouch',rowId};
    });
    schedule[wk][key]={activity:'notouch',rowId:null};
  }
  // Re-render just the row
  renderScheduleView();
}
function renderScheduleView(){
  const wk=getSchedWeekKey(schedWeekOffset);
  if(!schedule[wk])schedule[wk]={};
  const sorted=[...deals].sort((a,b)=>a.tier-b.tier||b.arr-a.arr);
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];

  const schedTiers=[...new Set(sorted.map(d=>d.tier))].sort();
  let rows='';
  schedTiers.forEach(tier=>{
    const group=sorted.filter(d=>d.tier===tier);
    group.forEach(d=>{
      const noTouchKey=`notouch__${d.id}`;
      const isNoTouch=!!(schedule[wk][noTouchKey]);

      // Find earliest day with an activity this week
      const firstActivityIdx=days.findIndex(day=>{
        const val=schedule[wk][`${d.id}__${day}`];
        return val&&val.activity;
      });

      const cells=days.map((day,idx)=>{
        const key=`${d.id}__${day}`;
        const val=schedule[wk][key]||'';
        // Green if: no-touch checked, OR day is at or before the first activity
        const isGreen=isNoTouch||(firstActivityIdx>=0&&idx<=firstActivityIdx);
        const bg=isGreen?'var(--green-row)':'var(--surface)';
        return`<td class="day-cell" style="background:${bg};"><div class="cell-wrap" id="cell-${d.id}-${day}">${cellInner(d.id,day,val)}</div></td>`;
      }).join('');

      const rowFullGreen=isNoTouch;
      const nameBg=rowFullGreen?'var(--green-row)':'var(--surface)';
      const nameColor=rowFullGreen?'var(--green-text)':'inherit';
      const tierBg=rowFullGreen?'var(--green-row)':'var(--surface)';

      rows+=`<tr>
        <td style="width:28px;padding:5px 8px;background:${tierBg};"><div style="display:flex;align-items:center;gap:5px"><div class="tier-stripe stripe-${Math.min(d.tier,4)}" style="height:20px;"></div><span class="tier-num">${d.tier}</span></div></td>
        <td class="sched-deal-name" style="overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:${nameBg};color:${nameColor};" onclick="openDeal(${d.id})">${d.name}</td>
        <td style="text-align:center;padding:4px 6px;background:${tierBg};"><input type="checkbox" class="scenario-cb" ${isNoTouch?'checked':''} onclick="event.stopPropagation();toggleNoTouch(${d.id})" title="No touch needed this week"></td>
        ${cells}
      </tr>`;
    });
    rows+=`<tr class="subtotal-row" style="cursor:default;">
      <td colspan="8" style="border-top:1px solid var(--border2);border-bottom:2px solid var(--border2);padding:4px 12px;">Tier ${tier} — ${group.length} deal${group.length!==1?'s':''}</td>
    </tr>`;
  });

  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header">
      <div class="panel-title">Schedule</div>
      <div class="sched-nav">
        <button class="sched-wk-btn" onclick="schedWeekOffset--;renderScheduleView()">‹</button>
        <span class="sched-week-label">${formatSchedWeek(schedWeekOffset)}</span>
        <button class="sched-wk-btn" onclick="schedWeekOffset++;renderScheduleView()">›</button>
        <button class="sched-wk-btn" onclick="schedWeekOffset=0;renderScheduleView()">This week</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="sched-table">
        <thead><tr>
          <th style="width:32px"></th>
          <th style="width:160px">Deal</th>
          <th style="width:36px;text-align:center;" title="No touch needed"></th>
          <th class="day-col-h" style="width:110px">Monday</th>
          <th class="day-col-h" style="width:110px">Tuesday</th>
          <th class="day-col-h" style="width:110px">Wednesday</th>
          <th class="day-col-h" style="width:110px">Thursday</th>
          <th class="day-col-h" style="width:110px">Friday</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── SCENARIO STATE ──
const SCENARIO_NAMES=['Best case','Upside','Stretch'];
let scenarioChecked=new Set();
let activeScenario=null; // 'Best case' | 'Upside' | 'Stretch' | null
let scenarios={}; // {name: [id, id, ...]}

let lastKnownArr={}; // dealName -> last known ARR across all snapshots

async function loadScenarios(){
  try{
    const rows=await sbGet('scenarios','select=*');
    scenarios={};
    rows.forEach(r=>{scenarios[r.name]=JSON.parse(r.deal_ids||'[]');});
  }catch(e){
    const s=localStorage.getItem('crm_scenarios');
    if(s)scenarios=JSON.parse(s);
  }
  // Build lastKnownArr from ALL deals across all snapshots
  try{
    const allDeals=await sbGet('deals','select=name,arr');
    allDeals.forEach(r=>{
      if(r.arr && (!lastKnownArr[r.name] || r.arr > lastKnownArr[r.name])){
        lastKnownArr[r.name]=r.arr;
      }
    });
  }catch(e){console.warn('lastKnownArr error',e);}
}

async function saveScenario(){
  if(!activeScenario)return;
  const names=deals.filter(d=>scenarioChecked.has(d.id)).map(d=>d.name);
  scenarios[activeScenario]=names;
  try{
    await sbDelete('scenarios',`name=eq.${encodeURIComponent(activeScenario)}`);
    await sbInsert('scenarios',{name:activeScenario,deal_ids:JSON.stringify(names)});
  }catch(e){
    localStorage.setItem('crm_scenarios',JSON.stringify(scenarios));
  }
  renderScenarioView();
  setStatus(`"${activeScenario}" saved`,'ok');
}

let scenarioMissingDeals=[]; // deals in scenario not found in current snapshot

function loadScenarioIntoView(name){
  activeScenario=name;
  const names=scenarios[name]||[];
  // Find which names exist in current snapshot
  const foundNames=deals.filter(d=>names.includes(d.name)).map(d=>d.name);
  scenarioChecked=new Set(deals.filter(d=>names.includes(d.name)).map(d=>d.id));
  // Track missing: names in scenario not found in current snapshot
  // Look up their last known ARR from all_deal_history cache
  scenarioMissingDeals=names
    .filter(n=>!foundNames.includes(n))
    .map(n=>({name:n,arr:lastKnownArr[n]||null}));
  renderScenarioView();
}

function toggleScenario(id){
  if(scenarioChecked.has(id)) scenarioChecked.delete(id);
  else scenarioChecked.add(id);
  renderScenarioView();
}

function renderScenarioView(){
  if(!deals.length){document.getElementById('main-panel').innerHTML=emptyState();return;}
  const sorted=[...deals].sort((a,b)=>a.tier-b.tier||b.arr-a.arr);

  // Calculate sums
  const sums={mar:0,apr:0,may:0,jun:0,q3:0,total:0};
  deals.filter(d=>scenarioChecked.has(d.id)).forEach(d=>{
    const col=getCol(d.closeDate);
    if(sums[col]!==undefined)sums[col]+=d.arr||0;

  const gap=Math.max(quotaData.quota - quotaData.closed - sums.total, 0);
  const scenPct=Math.min(Math.round(((quotaData.closed+sums.total)/quotaData.quota)*100),100);

        <td style="width:36px;text-align:center;"><input type="checkbox" class="scenario-cb" ${isChecked?'checked':''} onclick="event.stopPropagation();toggleScenario(${d.id})"></td>

    ${gtCells}
    <td class="num">${fmtK(g2.arr)}</td>

  const checkedCount=scenarioChecked.size;

  {id:'quality',     label:'Quality meetings',        goal:6,   auto:false, fmt:'num'},

];

let metricsData = {};      // {weekKey: {metricId: {actual, goal}}}
let metricGoals = {};      // overridden goals {metricId: goal}
let convictionUpdateCount = 0; // auto-tracked this session

async function loadMetrics(){
  try{
    const rows = await sbGet('metrics','select=*');
    metricsData = {};
    rows.forEach(r=>{
      if(!metricsData[r.week_key])metricsData[r.week_key]={};
      metricsData[r.week_key][r.metric_id]={actual:r.actual, goal:r.goal, rowId:r.id};
    });
    // Load goal overrides
    const goals = await sbGet('metric_goals','select=*');
    metricGoals = {};
    goals.forEach(r=>{metricGoals[r.metric_id]=r.goal;});
  }catch(e){
    // Tables may not exist yet — use localStorage
    const d = localStorage.getItem('crm_metrics');
    if(d)metricsData=JSON.parse(d);
    const g = localStorage.getItem('crm_metric_goals');
    if(g)metricGoals=JSON.parse(g);
  }
}

function getMetricWeekKey(){
  // Use current Monday-based week key
  const now=new Date();
  const day=now.getDay();
  const diff=now.getDate()-day+(day===0?-6:1);
  const mon=new Date(now);mon.setDate(diff);mon.setHours(0,0,0,0);
  return`metrics-${mon.getFullYear()}-${mon.getMonth()}-${mon.getDate()}`;
}

function getMetricGoal(m){
  return metricGoals[m.id]!==undefined ? metricGoals[m.id] : m.goal;
}

function getPctClass(pct){
  if(pct===null||pct===undefined)return'm-empty';
  if(pct>=80)return'm-green';
  if(pct>=50)return'm-yellow';
  return'm-red';
}

async function saveMetricActual(weekKey, metricId, actual){
  const goal = getMetricGoal(METRIC_DEFS.find(m=>m.id===metricId));
  if(!metricsData[weekKey])metricsData[weekKey]={};
  const existing = metricsData[weekKey][metricId];
  try{
    if(existing?.rowId){
      await sbUpdate('metrics',existing.rowId,{actual,goal,updated_at:new Date().toISOString()});
      metricsData[weekKey][metricId].actual=actual;
    } else {
      const rows=await sbInsert('metrics',{week_key:weekKey,metric_id:metricId,actual,goal});
      metricsData[weekKey][metricId]={actual,goal,rowId:rows[0].id};
    }
  }catch(e){
    // localStorage fallback
    if(!metricsData[weekKey])metricsData[weekKey]={};
    metricsData[weekKey][metricId]={actual,goal};
    localStorage.setItem('crm_metrics',JSON.stringify(metricsData));
  }
}

async function saveMetricGoal(metricId, goal){
  metricGoals[metricId]=goal;
  try{
    // Try upsert
    await sbDelete('metric_goals',`metric_id=eq.${metricId}`);
    await sbInsert('metric_goals',{metric_id:metricId,goal});
  }catch(e){
    localStorage.setItem('crm_metric_goals',JSON.stringify(metricGoals));
  }
}

function startEditMetricActual(weekKey, metricId, el){
  const existing = metricsData[weekKey]?.[metricId];
  const cur = existing?.actual!==undefined ? existing.actual : '';
  const m = METRIC_DEFS.find(x=>x.id===metricId);
  const input=document.createElement('input');
  input.className='next-move-input';
  input.value=cur;
  input.style.width='60px';
  input.style.textAlign='center';
  el.replaceWith(input);
  input.focus();input.select();
  const finish=async()=>{
    const raw=input.value.trim().replace(/[$k,]/gi,'');
    const val = m.fmt==='money' ? parseFloat(raw)*( input.value.includes('k')||input.value.includes('K')?1000:1) : parseFloat(raw);
    const finalVal = isNaN(val)?null:val;
    await saveMetricActual(weekKey,metricId,finalVal);
    renderMetricsView();
  };
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){renderMetricsView();}
  });
}

function startEditMetricGoal(metricId, el){
  const m = METRIC_DEFS.find(x=>x.id===metricId);
  const cur = getMetricGoal(m);
  const input=document.createElement('input');
  input.className='next-move-input';
  input.value=m.fmt==='money'?cur/1000:cur;
  input.style.width='50px';
  input.style.textAlign='center';
  el.replaceWith(input);
  input.focus();input.select();
  const finish=async()=>{
    const raw=input.value.trim().replace(/[$k,]/gi,'');
    const val = m.fmt==='money' ? parseFloat(raw)*1000 : parseFloat(raw);
    if(!isNaN(val)){await saveMetricGoal(metricId,val);}
    renderMetricsView();
  };
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){renderMetricsView();}
  });
}

async function startEditWeekGoal(weekKey, metricId, el){

      await saveMetricActual(weekKey,metricId+'_goal',val);

function trackConvictionUpdate(dealId){
  const wk=getMetricWeekKey();
  if(!convictionUpdatesThisWeek[wk])convictionUpdatesThisWeek[wk]=new Set();
  convictionUpdatesThisWeek[wk].add(dealId);
  // Auto-save count
  const count=convictionUpdatesThisWeek[wk].size;
  saveMetricActual(wk,'conviction',count);
}

function renderMetricsView(){
  const weeks=[];
  // 3 past + current + 3 future = offsets -3 to +3
  for(let i=-3;i<=3;i++){
    const now=new Date();
    const day=now.getDay();
    const diff=now.getDate()-day+(day===0?-6:1)+(i*7);
    const mon=new Date(now);mon.setDate(diff);mon.setHours(0,0,0,0);
    const wk=`metrics-${mon.getFullYear()}-${mon.getMonth()}-${mon.getDate()}`;
    const label=`${MONTHS[mon.getMonth()]} ${mon.getDate()}`;
    const isFuture=i>0;
    weeks.push({wk,label,isCurrent:i===0,isFuture});
  }

  const headerCells=weeks.map(w=>`<th style="min-width:88px;${w.isCurrent?'color:var(--text);font-weight:600;':w.isFuture?'color:var(--text3);':''}">${w.label}${w.isCurrent?'<br><span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0;">this week</span>':''}</th>`).join('');

  const fmtVal=(v,fmt)=>{
    if(v===null||v===undefined)return'';
    if(fmt==='money')return'$'+(v>=1000?(v/1000).toFixed(0)+'k':v);
    return v;
  };

  let rows='';
  METRIC_DEFS.forEach(m=>{
    const getWkGoal=wk=>{
      const g=metricsData[wk]?.[m.id+'_goal'];
      return g?.actual!==undefined?g.actual:getMetricGoal(m);
    };

    const actualCells=weeks.map(w=>{
      const entry=metricsData[w.wk]?.[m.id];
      const actual=entry?.actual;
      const wGoal=getWkGoal(w.wk);
      const pct=wGoal>0&&actual!=null?Math.round((actual/wGoal)*100):null;
      const cls=getPctClass(pct);
      const display=fmtVal(actual,m.fmt);
      const bg=w.isCurrent?'background:var(--surface2);':w.isFuture?'background:#FAFAF8;':'';
      if(m.auto){
        return`<td style="${bg}text-align:center;">${display?`<span class="${cls}" style="font-size:12px;font-weight:500;font-family:'DM Mono',monospace;">${display}</span>`:`<span style="color:var(--text3);font-size:11px;">${w.isFuture?'·':'auto'}</span>`}</td>`;
      }
      return`<td style="${bg}text-align:center;cursor:text;" onclick="startEditMetricActual('${w.wk}','${m.id}',this)">${display?`<span class="${cls}" style="font-size:12px;font-weight:500;font-family:'DM Mono',monospace;">${display}</span>`:`<span style="color:var(--text3);">—</span>`}</td>`;
    }).join('');

    const goalCells=weeks.map(w=>{
      const wGoal=getWkGoal(w.wk);
      const display=fmtVal(wGoal,m.fmt);
      const bg=w.isCurrent?'background:var(--surface2);':w.isFuture?'background:#FAFAF8;':'';
      return`<td style="${bg}text-align:center;cursor:text;font-size:11px;color:var(--text2);" onclick="startEditWeekGoal('${w.wk}','${m.id}',this)">${display}</td>`;
    }).join('');

    const pctCells=weeks.map(w=>{
      const entry=metricsData[w.wk]?.[m.id];
      const actual=entry?.actual;
      const wGoal=getWkGoal(w.wk);
      if(actual==null||!wGoal)return`<td style="text-align:center;font-size:11px;color:var(--text3);">—</td>`;
      const pct=Math.round((actual/wGoal)*100);
      const col=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
      return`<td style="text-align:center;font-size:11px;font-weight:500;color:${col};">${pct}%</td>`;
    }).join('');

    const autoTag=m.auto?` <span style="font-size:9px;color:var(--text3);font-weight:400;">(auto)</span>`:'';
    rows+=`
      <tr style="border-top:2px solid var(--border2);">
        <td class="metric-name" rowspan="3" style="vertical-align:middle;border-right:1px solid var(--border);">${m.label}${autoTag}</td>
        <td style="font-size:10px;color:var(--text3);padding:4px 10px;white-space:nowrap;">Actual</td>
        ${actualCells}
      </tr>
      <tr>
        <td style="font-size:10px;color:var(--text3);padding:4px 10px;white-space:nowrap;">Goal</td>
        ${goalCells}
      </tr>
      <tr>
        <td style="font-size:10px;color:var(--text3);padding:4px 10px;white-space:nowrap;">% to goal</td>
        ${pctCells}
      </tr>`;
  });

  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header">
      <div class="panel-title">Metrics</div>
      <div style="font-size:11px;color:var(--text3);">Click Actual or Goal to edit inline</div>
    </div>
    <div class="table-wrap">
      <table class="metrics-table">
        <thead><tr>
          <th style="width:150px;text-align:left;">Metric</th>
          <th style="width:65px;"></th>
          ${headerCells}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

const PATTERNS=[
  {test:s=>s.every(x=>x==='convinced'),name:'Close-ready',read:'All four dimensions confirmed. Deal is yours to lose.',move:'Drive MAP and compress paper process. Protect champion from internal drift.'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]==='convinced'&&s[3]!=='convinced',name:'Conviction without a path',read:'Strong belief across product, solution, and situation — but no clear process to close.',move:'Schedule a process call with procurement or legal. Don\'t let the champion shield you.'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]==='unaware',name:'Believers without a deadline',read:'Strong solution conviction but no situation created.',move:'Find or create a compelling event. Ask EB: what happens if this isn\'t solved by Q3?'},
  {test:s=>s[0]==='convinced'&&s[1]==='convinced'&&s[2]!=='convinced',name:'Strong on substance, weak on close',read:'Product and solution confirmed, but situation is missing.',move:'Qualify situation with EB directly. Champion conviction without EB situation doesn\'t close.'},
  {test:s=>s[0]==='convinced'&&s[1]==='unaware',name:'Feature believer, not a buyer',read:'Product confirmed but solution not yet personal.',move:'Stop demoing. Ask: what does your team do today when this breaks?'},
  {test:s=>s[2]==='convinced'&&s[0]!=='convinced',name:'Situation without product belief',read:'Real deadline present — but product unconfirmed.',move:'Slow down. Validate product before letting timing drive the process.'},
  {test:s=>s.every(x=>x==='exploring'),name:'Broad exploration, no anchor',read:'Active across all four — nothing resolved. Looks like momentum, might be drift.',move:'Pick one dimension and drive it to Convinced. Product closes fastest.'},
  {test:s=>s[0]==='unaware'&&(s[1]==='exploring'||s[2]==='exploring'||s[3]==='exploring'),name:'Exploring without a foundation',read:'Engaged on multiple dimensions but product unconfirmed.',move:'Anchor product confirmation before advancing other conversations.'},
  {test:s=>s[0]==='convinced'&&s[1]!=='convinced',name:'Early stage — product confirmed',read:'Good foundation. Now the deal needs to become personal.',move:'Move to solution. Get a specific before/after story they personally own.'},
  {test:s=>s.every(x=>x==='unaware'),name:'Pre-discovery',read:'No conviction established on any dimension.',move:'Start with product. Confirm fit before exploring solution.'},
];

function diagnose(states){
  for(const p of PATTERNS)if(p.test(states))return p;
  const dims=['Product','Solution','Situation','Process'];
  const stuck=dims.filter((_,i)=>states[i]==='unaware');
  return{name:'Mixed conviction',read:'Some dimensions moving.'+(stuck.length?' '+stuck.join(' and ')+' not yet engaged.':''),move:'Focus on lowest-state dimension. Drive it to Exploring before spreading attention.'};
}

const DIMS=[
  {label:'Product',q:'"Can it do what I need?"'},
  {label:'Solution',q:'"Will it actually change things?"'},
  {label:'Situation',q:'"Is now the right time to act?"'},
  {label:'Process',q:'"Can we actually get this done?"'},
];

  document.getElementById('side-body').innerHTML=`

    </div>
    <div class="field-lbl" style="margin-bottom:6px;margin-top:4px;">Ask Claude</div>
    <div id="ask-resp" style="display:none;max-height:260px;overflow-y:auto;" class="ask-resp"></div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <input type="text" id="ask-input" placeholder="Ask about this deal..." onkeydown="if(event.key==='Enter')askClaude()" style="flex:1;font-size:12px;">
      <button onclick="askClaude()" style="padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;white-space:nowrap;">✦ Ask</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
      <button onclick="askClaude()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;" id="btn-start-convo">Start coaching session</button>

    </div>

  // Load existing history for this deal
  const dealKey=String(d.id);
  if(dealHistories[dealKey]&&dealHistories[dealKey].length>0){
    setTimeout(()=>{
      renderChatHistory(dealHistories[dealKey]);
      const btn=document.getElementById('btn-start-convo');
      if(btn)btn.style.display='none';
    },0);
  }
}

function renderDetails(){
  const d=activeDeal;
  const tierOpts=[1,2,3,4].map(v=>`<option value="${v}" ${d.tier===v?'selected':''}>Tier ${v}</option>`).join('');
  document.getElementById('side-body').innerHTML=`
    <div class="field-row"><div class="field-lbl">Tier</div><select onchange="updateField('tier',parseInt(this.value));render()">${tierOpts}</select></div>
    <div class="field-row"><div class="field-lbl">NSTW</div><input type="text" value="${(d.nstw||'').replace(/"/g,'&quot;')}" onchange="updateField('nstw',this.value)"></div>
    <div class="field-row"><div class="field-lbl">Deal stage</div><input type="text" value="${(d.stage||'').replace(/"/g,'&quot;')}" onchange="updateField('stage',this.value)"></div>
    <div class="field-row"><div class="field-lbl">Close date</div><input type="text" value="${d.closeDate||''}" placeholder="YYYY-MM-DD" onchange="updateField('closeDate',this.value);render()"></div>
    <div class="field-row"><div class="field-lbl">ARR</div><input type="text" value="${d.arr||''}" onchange="updateField('arr',parseFloat(this.value)||0);render()"></div>
    <button class="save-btn" onclick="saveDeal()">Save</button>
    <button onclick="deleteDeal()" style="width:100%;margin-top:8px;padding:9px;border-radius:var(--radius);border:1px solid #F7C1C1;background:transparent;color:var(--red-text);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .12s;" onmouseover="this.style.background='var(--red-bg)'" onmouseout="this.style.background='transparent'">Delete deal</button>`;
}

async function deleteDeal(){
  if(!activeDeal||isReadOnly)return;
  if(!confirm(`Delete "${activeDeal.name}"? This cannot be undone.`))return;
  const id=activeDeal.id;
  try{
    await sbDelete('deals',`id=eq.${id}`);
    deals=deals.filter(d=>d.id!==id);
    closeSide();
    render();
    setStatus('Deal deleted','ok');
  }catch(e){
    setStatus('Delete error: '+e.message,'error');
  }
}

async function setState(dimIdx,state){
  if(!activeDeal||isReadOnly)return;
  const keys=['capability','impact','urgency','path'];
  const d=deals.find(x=>x.id===activeDeal.id);
  if(d){d[keys[dimIdx]]=state;activeDeal=d;}
  await saveOneDeal(activeDeal);
  // Only track conviction updates for existing deals (not fresh imports)
  if(d&&d.id&&dbLoaded)trackConvictionUpdate(d.id);
  renderConviction();
}

function updateField(key,val){
  if(!activeDeal)return;
  const d=deals.find(x=>x.id===activeDeal.id);
  if(d){d[key]=val;activeDeal=d;}
}

async function saveDeal(){
  const nm=document.getElementById('f-nextmove');
  if(nm&&activeDeal){const d=deals.find(x=>x.id===activeDeal.id);if(d){d.nextMove=nm.value;activeDeal=d;}}
  if(activeDeal)await saveOneDeal(activeDeal);
  render();
  const btn=document.querySelector('.save-btn');
  if(btn){btn.textContent='Saved ✓';setTimeout(()=>btn.textContent='Save',1500);}
}

// Per-deal conversation histories — stored in Supabase deal_histories table
// In-memory cache: {dealId: [{role, content, sbId}]}
let dealHistories={};

async function loadDealHistory(dealId){
  try{
    const rows=await sbGet('deal_histories',`deal_id=eq.${dealId}&order=created_at.asc`);
    dealHistories[String(dealId)]=rows.map(r=>({role:r.role,content:r.content,sbId:r.id}));
  }catch(e){dealHistories[String(dealId)]=[];}
}

async function saveDealHistories(){
  // no-op: individual messages are saved inline in askClaude
}

function renderChatHistory(history){
  const el=document.getElementById('ask-resp');
  if(!el)return;
  if(!history||history.length===0){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=history.map(m=>{
    const isUser=m.role==='user';
    return`<div style="margin-bottom:10px;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:${isUser?'var(--text3)':'var(--green-text)'};margin-bottom:3px;">${isUser?'You':'Coach'}</div>
      <div style="font-size:12px;line-height:1.6;color:${isUser?'var(--text2)':'var(--text)'};">${m.content.replace(/\n/g,'<br>')}</div>
    </div>`;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">');
  el.scrollTop=el.scrollHeight;
}

async function askClaude(){
  if(!activeDeal)return;
  const d=activeDeal;
  const inp=document.getElementById('ask-input');
  const userMsg=inp?inp.value.trim():'';

  const states=[d.capability||'unaware',d.impact||'unaware',d.urgency||'unaware',d.path||'unaware'];
  const p=diagnose(states);

  const dealKey=String(d.id);
  if(!dealHistories[dealKey])dealHistories[dealKey]=[];
  const history=dealHistories[dealKey];

  const systemPrompt=`You are an expert B2B sales coach helping a rep manage a specific deal. Here is the current deal context — refer back to this throughout the conversation:

Deal: ${d.name}
ARR: ${fmtK(d.arr)}
Stage: ${d.stage}
Close date: ${d.closeDate||'unknown'}
Rep notes: ${d.notes||'None'}
Conviction map:
- Product (Can it do what I need?): ${states[0]}
- Solution (Will it actually change things?): ${states[1]}
- Situation (Is now the right time?): ${states[2]}
- Process (Can we get this done?): ${states[3]}
Current pattern: ${p.name}
Suggested next move: ${p.move}

You have memory of this conversation. Be direct, specific, and tactical. Reference prior messages when relevant.`;

  // First message auto-prompt if history is empty
  const firstMsg=history.length===0&&!userMsg
    ?`Give me 3 specific questions I should ask on my next call to advance the weakest conviction dimension.`
    :userMsg;

  if(!firstMsg)return;
  if(inp)inp.value='';

  history.push({role:'user',content:firstMsg});
  renderChatHistory(history);

  const respEl=document.getElementById('ask-resp');
  if(respEl){
    respEl.style.display='block';
    // Add thinking indicator to last entry
    const thinking=document.createElement('div');
    thinking.id='thinking-indicator';
    thinking.style.cssText='font-size:11px;color:var(--text3);font-style:italic;margin-top:6px;';
    thinking.textContent='Thinking...';
    respEl.appendChild(thinking);
  }

  try{
    // Save user message to DB
    try{
      const uRows=await sbInsert('deal_histories',{deal_id:d.id,role:'user',content:firstMsg});
      history[history.length-1].sbId=uRows[0]?.id;
    }catch(e){console.warn('History save error',e);}

    const messages=history.map(m=>({role:m.role,content:m.content}));
    const res=await fetch('/.netlify/functions/ask-claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:systemPrompt,
        messages
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const reply=data.content?.find(b=>b.type==='text')?.text||'No response from Claude.';
    history.push({role:'assistant',content:reply});

    // Save assistant message to DB
    try{
      const aRows=await sbInsert('deal_histories',{deal_id:d.id,role:'assistant',content:reply});
      history[history.length-1].sbId=aRows[0]?.id;
    }catch(e){console.warn('History save error',e);}

    renderChatHistory(history);
  }catch(e){
    const errMsg='Error: '+e.message;
    history.push({role:'assistant',content:errMsg});
    renderChatHistory(history);
  }
}

async function clearDealHistory(){
  if(!activeDeal)return;
  const dealKey=String(activeDeal.id);
  try{
    await sbDelete('deal_histories',`deal_id=eq.${activeDeal.id}`);
    delete dealHistories[dealKey];
  }catch(e){console.warn('Clear history error',e);}
  document.getElementById('ask-resp').style.display='none';
}

/* ── CSV IMPORT ── */
document.getElementById('csv-input').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    function parseCSVLine(line){
      const result=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){inQ=!inQ;}
        else if(c===','&&!inQ){result.push(cur.trim());cur='';}
        else{cur+=c;}
      }
      result.push(cur.trim());
      return result;
    }
    function cleanNum(s){return parseFloat((s||'').replace(/[$,\s]/g,''))||0;}
    function cleanDate(s){return(s||'').trim().split(' ')[0];}

    const lines=ev.target.result.trim().split(/\r?\n/);
    const headers=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
    setStatus('Creating snapshot...','info');

    // Create new snapshot
    const weekLabel=getWeekLabel(new Date());
    const weekDate=new Date().toISOString().split('T')[0];
    let snapId;
    try{
      const snapRows=await sbInsert('snapshots',{week_label:weekLabel,week_date:weekDate});
      snapId=snapRows[0].id;
      snapshots.unshift({id:snapId,week_label:weekLabel,week_date:weekDate});
      activeSnapshotId=snapId;
      isReadOnly=false;
    }catch(e){
      setStatus('Snapshot error: '+e.message,'error');
      return;
    }

    let imported=0;
    setStatus('Importing deals...','info');
    deals=[];

    // Load previous snapshot's deals to carry forward conviction data
    let prevDeals={};
    if(snapshots.length>1){
      try{
        const prevSnapId=snapshots[1].id; // second most recent = previous week
        const prevRows=await sbGet('deals',`select=*&snapshot_id=eq.${prevSnapId}`);
        prevRows.forEach(r=>{ prevDeals[r.name.toLowerCase()]=dbToDeal(r); });
      }catch(e){console.warn('Could not load previous snapshot',e);}
    }

    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=parseCSVLine(lines[i]);
      const row={};headers.forEach((h,j)=>row[h]=(vals[j]||'').replace(/^"|"$/g,'').trim());
      const name=row['dealname']||row['name']||row['deal']||'';
      if(!name)continue;
      const hubFields={
        name,
        closeDate:cleanDate(row['closedate']||row['close']||''),
        stage:row['dealstage']||row['stage']||'',
        amount:cleanNum(row['amount'])||cleanNum(row['amountarr']),
        arr:cleanNum(row['arr'])||cleanNum(row['amountarr'])||cleanNum(row['amount']),
      };

      // Carry forward conviction from previous snapshot — reset tier and sentiment
      const prev=prevDeals[name.toLowerCase()];
      const newDeal={
        ...hubFields,
        tier:null,         // blank — forces re-evaluation
        sentiment:null,    // blank — forces re-evaluation
        pattern:prev?.pattern||'',
        nextMove:prev?.nextMove||'',
        nstw:prev?.nstw||'',
        capability:prev?.capability||'unaware',
        impact:prev?.impact||'unaware',
        urgency:prev?.urgency||'unaware',
        path:prev?.path||'unaware',
        notes:prev?.notes||'',
      };

      try{
        const inserted=await sbInsert('deals',dealToDb(newDeal,snapId));
        newDeal.id=inserted[0].id;
        deals.push(newDeal);
        imported++;
      }catch(e){console.warn('Import error for '+name,e);}
    }

    render();
    renderSnapshotSelector();
    setStatus(`Snapshot "${weekLabel}" created — ${imported} deals imported`,'ok');
  };
  reader.readAsText(file);e.target.value='';
});

  document.getElementById('main-panel').innerHTML='<div style="padding:2rem;color:var(--text3);font-size:13px;">Loading pipeline...</div>';
  try{
    await loadSnapshots();
    await Promise.all([loadDeals(), loadSchedule(), loadScenarios(), loadMetrics()]);
  }catch(e){
    console.warn('Init error',e);
    deals=[];
  }
  render();
  renderQuotaBar();
  renderSnapshotSelector();
}

init();
